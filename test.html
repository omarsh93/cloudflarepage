Content of the document......
<div id="area"></div>


<script type="text/javascript">

// ここにスクリプトを記述

function main() {
    url = "https://store.epicgames.com/ja/browse?sortBy=currentPrice&sortDir=ASC&priceTier=tierDiscouted&count=40";
    fetch(url)
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTPエラー: ${response.status}`);
            }
            elem = document.getElementById('area');
            elem.innerText = response.body;
            return;
        })
        .then(responseBody => {
            document.getElementById('message').innerText = responseBody.message;
        })
        .catch(error => {
            console.error('エラーが発生しました:', error);
            document.getElementById('message').innerText = 'エラーが発生しました。';
        });
}

main();

</script>
