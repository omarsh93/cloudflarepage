async function getData() {
  const url = "https://store.epicgames.com/ja/browse?sortBy=currentPrice&sortDir=ASC&priceTier=tierDiscouted&count=40";
  try {
    const response = await fetch(url);
    if (!response.ok) {
      throw new Error(`レスポンスステータス: ${response.status}`);
    }

    const result = await response.json();
    console.log(result);
  } catch (error) {
    console.error(error.message);
  }
}
